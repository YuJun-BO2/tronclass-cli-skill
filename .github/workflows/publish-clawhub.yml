name: Publish to ClawHub

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 1.0.0). Leave blank to let ClawHub infer.'
        required: false
        type: string
      dry_run:
        description: 'Preview only, do not publish.'
        type: boolean
        default: false

jobs:
  validate:
    name: Validate SKILL.md against agentskills spec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install skills-ref
        run: pipx install "git+https://github.com/agentskills/agentskills.git#subdirectory=skills-ref"

      - name: Stage skill with spec-compliant directory name
        run: |
          skill_name=$(awk '/^name:/ {print $2; exit}' SKILL.md)
          echo "Skill name: $skill_name"
          mkdir -p /tmp/stage
          rsync -a --exclude '.git' ./ "/tmp/stage/$skill_name/"
          echo "STAGED=/tmp/stage/$skill_name" >> "$GITHUB_ENV"

      - name: Validate
        run: skills-ref validate "$STAGED"

  resolve-publish-params:
    name: Resolve publish params
    needs: validate
    if: (github.event_name == 'push' && github.ref_type == 'tag') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.params.outputs.version }}
      dry_run: ${{ steps.params.outputs.dry_run }}
    steps:
      - id: params
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "dry_run=${{ inputs.dry_run }}" >> "$GITHUB_OUTPUT"
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
            # Strip leading 'v' from tag name (v1.2.3 -> 1.2.3)
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

  publish:
    name: Publish to ClawHub
    needs: resolve-publish-params
    permissions:
      contents: read
      id-token: write
    uses: openclaw/clawhub/.github/workflows/package-publish.yml@main
    with:
      dry_run: ${{ needs.resolve-publish-params.outputs.dry_run == 'true' }}
      version: ${{ needs.resolve-publish-params.outputs.version }}
    secrets:
      clawhub_token: ${{ secrets.CLAWHUB_TOKEN }}
